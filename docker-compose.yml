services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel-pedido-venda-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laravel-pedido-venda_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: laravel-pedido-venda-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-pedido-venda_network
    depends_on:
      - app

  db:
    image: mariadb:11
    container_name: laravel-pedido-venda-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: laravel-pedido-venda
      MARIADB_USER: pedido_venda_user
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - laravel-pedido-venda_network

networks:
  laravel-pedido-venda_network:
    driver: bridge

volumes:
  db_data: